<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sparkie Dash: Perfect Stop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-shell">
    <header class="top-bar">
      <img id="topLogo" class="brand-logo" src="../assets/Value-Logo.png" alt="Valu logo" />
      <div class="hud-pill">
        <span>Score <strong id="scoreValue">0</strong></span>
        <span>Best <strong id="bestScoreValue">0</strong></span>
        <span>Round <strong id="roundValue">1</strong></span>
        <span>Streak <strong id="streakValue">0</strong></span>
      </div>
    </header>

    <main class="stage">
      <section id="startScreen" class="screen active" aria-live="polite">
        <img id="sparkieLogo" class="screen-logo" src="../assets/sparkie_logo.png" alt="Sparkie Dash" />
        <h1>Sparkie Dash</h1>
        <h2>Perfect Stop</h2>
        <p>Stop Sparkie in the perfect zone.</p>
        <ul>
          <li>Press <strong>SPACE</strong> or <strong>ENTER</strong></li>
          <li>Or click/tap anywhere on the track</li>
          <li>Time your stop for the highest score</li>
        </ul>
        <button id="startBtn" class="cta">Start Dash</button>
      </section>

      <section id="gameScreen" class="screen gameplay" aria-label="Sparkie Dash game">
        <div class="track-wrap">
          <div id="track" class="track">
            <div id="goodZone" class="zone good-zone"></div>
            <div id="perfectZone" class="zone perfect-zone"></div>
            <div id="sparkie" class="sparkie-runner">
              <img id="sparkiePlayer" src="../assets/sparkie_player.png" alt="Sparkie" />
            </div>
          </div>
        </div>
        <p class="controls-hint">Press SPACE / ENTER / click / tap to STOP</p>
      </section>

      <section id="resultOverlay" class="result-overlay" aria-live="assertive" aria-hidden="true">
        <div class="result-card">
          <p id="resultLabel" class="result-label">PERFECT</p>
          <img id="resultIcon" class="result-icon" src="../assets/coins/coin_token.png" alt="Reward icon" />
          <p class="points">+<span id="roundPoints">100</span> points</p>
          <p class="accuracy">Accuracy: <span id="accuracyText">0 px from center</span></p>
          <div class="button-row">
            <button id="nextRoundBtn" class="cta">Play Again</button>
            <button id="restartBtn" class="cta secondary">Restart</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="game.js"></script>
</body>
</html>
