<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sparkie Jackpot | /runner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="runner-page" data-route="/runner">
    <section id="startScreen" class="screen card active" aria-label="Start Sparkie Jackpot">
      <img id="startLogo" class="brand-logo" src="assets/Value_Logo.png" alt="Sparkie logo" />
      <h1>Sparkie Jackpot</h1>
      <p class="tagline">Spin the reels, chase the glow, hit the SUPER JACKPOT.</p>

      <label for="playerNameInput">Player Name</label>
      <input id="playerNameInput" maxlength="20" autocomplete="off" placeholder="Enter your name" />
      <button id="startBtn" class="primary-btn">Start</button>
      <p class="helper">Tip: Press <strong>Enter</strong> to start.</p>
    </section>

    <section id="gameScreen" class="screen card" aria-label="Sparkie Jackpot machine">
      <img id="gameLogo" class="brand-logo" src="assets/Value_Logo.png" alt="Sparkie logo" />

      <div class="top-hud">
        <div class="pill"><span>Player</span><strong id="playerNameView">---</strong></div>
        <div class="pill"><span>Total Score</span><strong id="totalScoreView">0</strong></div>
        <div class="pill"><span>Best</span><strong id="bestScoreView">0</strong></div>
        <div class="pill"><span>Spins</span><strong id="spinCountView">0</strong></div>
      </div>

      <img id="sparkieDecor" class="sparkie-decor" src="assets/sparkie_player.png" alt="Sparkie mascot" />

      <div id="slotMachine" class="slot-machine" role="group" aria-label="Slot reels">
        <div class="reel" data-reel="0"><div class="symbol-shell"><img class="symbol-img" alt="Reel symbol" /></div></div>
        <div class="reel" data-reel="1"><div class="symbol-shell"><img class="symbol-img" alt="Reel symbol" /></div></div>
        <div class="reel" data-reel="2"><div class="symbol-shell"><img class="symbol-img" alt="Reel symbol" /></div></div>
      </div>

      <button id="spinBtn" class="primary-btn spin-btn">SPIN</button>

      <p id="resultMessage" class="result">Ready to spin!</p>
    </section>

    <div id="resultOverlay" class="result-overlay" aria-live="polite" aria-hidden="true">
      <div id="overlayText" class="overlay-text">+0</div>
    </div>
  </main>

  <script src="game.js"></script>
</body>
</html>
