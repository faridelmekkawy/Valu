<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sparkie Man</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header class="hud-shell">
      <img id="brandLogo" src="assets/Value-Logo.png" alt="Sparkie logo" />
      <div class="hud" aria-live="polite">
        <span>Score: <strong id="scoreValue">0</strong></span>
        <span>Time: <strong id="timerValue">30</strong>s</span>
        <span>Lives: <strong id="livesValue">3</strong></span>
        <span>Level: <strong id="levelValue">1</strong>/3</span>
        <span>Player: <strong id="nameValue">---</strong></span>
      </div>
      <div class="coin-legend" id="coinLegend"></div>
    </header>

    <main>
      <section id="startScreen" class="panel active">
        <button id="startBtn" aria-label="Press button to start">PRESS BUTTON TO START</button>
      </section>
      <section id="gameWrap" class="game-wrap" aria-label="Sparkie Man game area">
        <canvas id="gameCanvas" width="960" height="640"></canvas>
        <div id="levelBanner" class="level-banner" aria-live="polite"></div>
      </section>

      <section id="gameOverScreen" class="panel">
        <h2>Game Over</h2>
        <p><span id="finalName">Player</span>, your final score is:</p>
        <p id="finalScore">0</p>
        <img
          class="turn-finished-card"
          src="IMG_0296.png"
          alt="Turn finished card"
        />
        <div class="button-row">
          <button id="playAgainBtn">Play Again</button>
        </div>
        <p id="submitStatus"></p>
      </section>
    </main>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
